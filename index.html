  <!-- Theme Check and Update -->
  <script src="https://preline.co/assets/js/hs-unavailable-color-themes.js"></script>
  <script>
    function generateVariables(theme = "dashboard", brand = "blue") {
      const styleId = "#hs-brand-variables";
      let style = null;

      if (!document.querySelector(styleId)) {
        const head = document.querySelector("head");
        style = document.createElement("style");
        style.id = "hs-brand-variables";

        head.append(style);
      } else {
        style = document.querySelector(styleId);
      }

      style.textContent = `
        :root[data-theme="theme-${theme}"],
        [data-theme="theme-${theme}"] {
          --primary-50:       var(--color-${brand}-50);
          --primary-100:      var(--color-${brand}-100);
          --primary-200:      var(--color-${brand}-200);
          --primary-300:      var(--color-${brand}-300);
          --primary-400:      var(--color-${brand}-400);
          --primary-500:      var(--color-${brand}-500);
          --primary-600:      var(--color-${brand}-600);
          --primary-700:      var(--color-${brand}-700);
          --primary-800:      var(--color-${brand}-800);
          --primary-900:      var(--color-${brand}-900);
          --primary-950:      var(--color-${brand}-950);
        }
      `;
    }

    (function () {
      const unavailableColorThemes = window.HS_UNAVAILABLE_COLOR_THEMES;
      const pathname = window.location.pathname;
      let reducedThemes = [];
      let defaultTheme = "default";
      let defaultBrand = "blue";
      let defaultFont = "sans";

      const themesDefaults = {
        "default": "blue",
        "harvest": "amber",
        "retro": "fuchsia",
        "ocean": "cyan",
        "autumn": "yellow",
        "moon": "gray",
        "bubblegum": "pink",
        "cashmere": "mauve",
        "olive": "avocado",
      };

      for (const [key_i, value_i] of Object.entries(unavailableColorThemes)) {
        const { theme, excludes } = value_i;

        if (pathname.includes(key_i)) {
          defaultTheme = theme;

          if (Array.isArray(excludes)) {
            reducedThemes = excludes;
            break;
          } else {
            const result = [];

            if (excludes['*']) result.push(...excludes['*']);

            for (const [key_j, value_j] of Object.entries(excludes)) {
              if (key_j !== '*' && pathname.includes(key_j)) result.push(...value_j);
            }

            reducedThemes = result;
            break;
          }
        }
      }

      const colorTheme = localStorage.getItem('hs-clipboard-theme');
      const font = localStorage.getItem('hs-clipboard-font');
      const brand = localStorage.getItem('hs-clipboard-brand');
      const html = document.querySelector('html');
      const accessibleFilePathPatterns = [
        "/templates/",
        "/pro/agency/",
        "/pro/ai-chat/",
        "/pro/analytics/",
        "/pro/calendars/",
        "/pro/chat/",
        "/pro/cms/",
        "/pro/coffee-shop/",
        "/pro/crm/",
        "/pro/dashboard/",
        "/pro/ecommerce/",
        "/pro/files/",
        "/pro/inbox/",
        "/pro/payment/",
        "/pro/personal/",
        "/pro/project/",
        "/pro/shop/",
        "/pro/shop-marketplace/",
        "/pro/smart-home/",
        "/pro/startup/",
        "/pro/video-call/",
        "/pro/workspace/",
      ];
      const currentUrl = window.location.href;
      const isIncludedUrl = accessibleFilePathPatterns.some((pattern) => currentUrl.includes(pattern));

      if (isIncludedUrl) {
        (function () {
          const currentTheme = colorTheme && !reducedThemes.includes(colorTheme) ? colorTheme : defaultTheme;
          const currentBrand = brand || themesDefaults[currentTheme];

          console.log("Current Theme:", currentTheme);
          console.log("Current Brand:", brand, themesDefaults[currentTheme]);

          html.setAttribute('data-theme', `theme-${currentTheme}`);
          html.setAttribute('data-brand', currentBrand);

          generateVariables(currentTheme, currentBrand)
        })();

        (function () {
          const currentFont = font ?? defaultFont;

          html.setAttribute('data-font', currentFont);
        })();
      }
    })();
  </script>
  <script>
    (function () {
      const html = document.querySelector('html');
      const isLightOrAuto = localStorage.getItem('hs_theme') === 'light' || (localStorage.getItem('hs_theme') === 'auto' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
      const isDarkOrAuto = localStorage.getItem('hs_theme') === 'dark' || (localStorage.getItem('hs_theme') === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isLightOrAuto && html.classList.contains('dark')) html.classList.remove('dark');
      else if (isDarkOrAuto && html.classList.contains('light')) html.classList.remove('light');
      else if (isDarkOrAuto && !html.classList.contains('dark')) html.classList.add('dark');
      else if (isLightOrAuto && !html.classList.contains('light')) html.classList.add('light');
    })();
  </script>

  <script src="https://preline.co/assets/js/hs-unavailable-color-themes.js"></script>
  <script>
    (function () {
      const unavailableColorThemes = window.HS_UNAVAILABLE_COLOR_THEMES;

      const pathname = window.location.pathname;
      let reducedThemes = [];
      let defaultTheme = "default";
      const themesDefaults = {
        "default": "blue",
        "harvest": "amber",
        "retro": "fuchsia",
        "ocean": "cyan",
        "autumn": "yellow",
        "moon": "gray",
        "bubblegum": "pink",
        "cashmere": "mauve",
        "olive": "avocado",
      };
      let defaultBrand = "blue";
      let defaultFont = "sans";

      let currentTheme = defaultTheme;
      let currentBrand = defaultBrand;
      let currentFont = defaultFont;

      for (const [key_i, value_i] of Object.entries(unavailableColorThemes)) {
        const { theme, excludes } = value_i;

        if (pathname.includes(key_i)) {
          defaultTheme = theme;

          if (Array.isArray(excludes)) {
            reducedThemes = excludes;
            break;
          } else {
            const result = [];

            if (excludes['*']) result.push(...excludes['*']);

            for (const [key_j, value_j] of Object.entries(excludes)) {
              if (key_j !== '*' && pathname.includes(key_j)) result.push(...value_j);
            }

            reducedThemes = result;
            break;
          }
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        (function () {
          const globalColorThemeSwitchers = document.querySelectorAll('[data-hs-global-color-theme] input[type="radio"]');

          if (!globalColorThemeSwitchers.length) return;

          const colorTheme = localStorage.getItem('hs-clipboard-theme');
          if (!colorTheme) localStorage.setItem("hs-clipboard-theme", defaultTheme);
          let predefinedColorTheme = null;

          globalColorThemeSwitchers.forEach((el) => {
            if (el.value === colorTheme && !reducedThemes.includes(el.value)) predefinedColorTheme = el;

            if (reducedThemes.includes(el.value)) {
              el.disabled = true;
              el.closest('.group').classList.add('opacity-50', 'pointer-events-none');
            }

            el.addEventListener('change', (evt) => {
              const html = document.querySelector('html');
              const value = evt.target.value;

              localStorage.setItem('hs-clipboard-theme', value);
              html.setAttribute('data-theme', `theme-${value}`);

              window.dispatchEvent(new CustomEvent('on-hs-color-theme-change', {
                detail: {
                  target: html,
                  value: value,
                },
              }));

              currentTheme = value;
              currentBrand = themesDefaults[currentTheme];

              generateVariables(currentTheme, currentBrand);


              const themes = Array.from(document.querySelectorAll(`[data-hs-global-color-theme] input[value="${currentTheme}"]`));
              const brands = Array.from(document.querySelectorAll(`[data-hs-global-brand] input[value="${currentBrand}"]`));

              themes.filter((theme) => theme !== el).forEach((theme) => {
                theme.checked = true;
              });

              brands.forEach((brand) => {
                brand.checked = true;
              });

              brands[0].dispatchEvent(new Event("change", { bubbles: true }));
            });
          });

          if (!predefinedColorTheme) {
            predefinedColorTheme = Array.from(globalColorThemeSwitchers).find((el) => el.value === defaultTheme);
            predefinedColorTheme.checked = true;
          } else {
            predefinedColorTheme.checked = true;
          }

          currentTheme = predefinedColorTheme.value;
        })();

        (function () {
          const globalBrandSwitchers = document.querySelectorAll('[data-hs-global-brand] input[type="radio"]');

          if (!globalBrandSwitchers.length) return;

          let globalBrand = localStorage.getItem("hs-clipboard-brand") ?? themesDefaults[currentTheme];
          localStorage.setItem("hs-clipboard-brand", globalBrand);
          let predefinedBrand = null;

          globalBrandSwitchers.forEach((el) => {
            if (el.value === globalBrand) predefinedBrand = el;

            el.addEventListener('change', (evt) => {
              const html = document.querySelector('html');
              const value = evt.target.value;

              localStorage.setItem('hs-clipboard-brand', value);
              html.setAttribute('data-brand', value);

              window.dispatchEvent(new CustomEvent('on-hs-brand-change', {
                detail: {
                  target: html,
                  value: value,
                },
              }));

              currentBrand = value;

              generateVariables(currentTheme, currentBrand);
            });
          });

          if (!predefinedBrand) {
            predefinedBrand = Array.from(globalBrandSwitchers).find((el) => {
              console.log(el.value, globalBrand);

              return el.value === globalBrand;
            });
            predefinedBrand.checked = true;
          } else {
            predefinedBrand.checked = true;
          }

          currentBrand = predefinedBrand.value;

          generateVariables(currentTheme, currentBrand);
        })();

        (function () {
          const globalFontSwitchers = document.querySelectorAll('[data-hs-global-font] input[type="radio"]');

          if (!globalFontSwitchers.length) return;

          let globalFont = localStorage.getItem("hs-clipboard-font") ?? defaultFont;
          localStorage.setItem("hs-clipboard-font", globalFont);
          let predefinedFont = null;

          globalFontSwitchers.forEach((el) => {
            if (el.value === globalFont) predefinedFont = el;

            el.addEventListener('change', (evt) => {
              const html = document.querySelector('html');
              const value = evt.target.value;

              localStorage.setItem('hs-clipboard-font', value);
              html.setAttribute('data-font', value);

              window.dispatchEvent(new CustomEvent('on-hs-font-change', {
                detail: {
                  target: html,
                  value: value,
                },
              }));

              currentFont = value;
            });
          });

          if (!predefinedFont) {
            predefinedFont = Array.from(globalFontSwitchers).find((el) => {
              console.log(el.value, globalFont);
              return el.value === globalFont;
            });
            predefinedFont.checked = true;
          } else {
            predefinedFont.checked = true;
          }

          currentFont = predefinedFont.value;
        })();
      });
    })();
  </script>
